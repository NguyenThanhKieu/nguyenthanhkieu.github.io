<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン - SDCheck</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .navbar {
            background-color: #333;
            padding: 10px;
        }
        .navbar a {
            color: white;
            margin-right: 20px;
            text-decoration: none;
            font-weight: bold;
        }
        .navbar a:hover {
            text-decoration: underline;
        }
        .navbar-right {
            float: right;
        }
    </style>
</head>

<body>

    <!-- ⭐ Menu template -->
    <div id="menu"></div>

    <h1>ログイン</h1>

    <p>ダウンロードするにはログインが必要です。</p>

    <form onsubmit="login(); return false;">
        <label>ユーザー名：</label><br>
        <input type="text" id="username" required><br><br>

        <label>パスワード：</label><br>
        <input type="password" id="password" required><br><br>

        <button type="submit">ログイン</button>
    </form>

    <p id="error" style="color:red;"></p>

    <script>
        // ⭐ Load menu template
        fetch("menu.html")
            .then(res => res.text())
            .then(html => {
                document.getElementById("menu").innerHTML = html;

                // Sau khi menu được load → xử lý Login/Logout
                const loggedIn = localStorage.getItem("loggedIn");

                if (loggedIn === "true") {
                    document.getElementById("loginLink").style.display = "none";
                    document.getElementById("logoutLink").style.display = "inline";
                } else {
                    document.getElementById("loginLink").style.display = "inline";
                    document.getElementById("logoutLink").style.display = "none";
                }
            });

        // ⭐ Lưu trang hiện tại trước khi login
        function savePage() {
            localStorage.setItem("returnPage", window.location.href);
        }

        // ⭐ Logout
        function logout() {
            localStorage.removeItem("loggedIn");
            localStorage.removeItem("username");
            localStorage.removeItem("returnPage");
            window.location.href = "index.html";
        }

        // ⭐ Xử lý login
        function login() {
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            const validUsers = [
                { username: "admin", password: "123456" },
                { username: "kieu", password: "sdcheck" }
            ];

            const found = validUsers.find(u => u.username === user && u.password === pass);

            if (found) {
                localStorage.setItem("loggedIn", "true");
                localStorage.setItem("username", user);

                const returnPage = localStorage.getItem("returnPage");

                if (returnPage) {
                    window.location.href = returnPage;
                } else {
                    window.location.href = "index.html";
                }
            } else {
                document.getElementById("error").textContent =
                    "ユーザー名またはパスワードが正しくありません。";
            }
        }
    </script>

</body>
</html>
